# ============================================================
# 币安USDT永续合约数据分析系统 - 主配置文件
# ============================================================

# 服务端口
server:
  port: 8080

spring:
  mvc:
    log-resolved-exception: false
  web:
  datasource:
#    url: jdbc:mysql://localhost:3306/ba?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    url: jdbc:mysql://192.168.193.128:3306/ba?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai

    username: root
#    password: Kzfx8N78@123456
    password: Test#1234

    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
    resources:
      add-mappings: true

logging:
  level:
    org.springframework.web.servlet.resource.ResourceHttpRequestHandler: ERROR

binance:
  base-url: https://fapi.binance.com

  proxy:
    enabled: true
    host: 127.0.0.1
    port: 7897

  concurrency:
    max-requests: 10
    request-interval-ms: 100
    history-buffer-days: 30
    task-timeout-seconds: 120

  symbol:
    file-path: ./data/symbols.json

  analysis:

    consecutive-rise:
      enabled: false
      days: 5
      volume-surge-ratio: 1.0

    rise-then-drop:
      enabled: false
      days: 5
      volume-surge-ratio: 1.0

    high-rise:
      enabled: false
      days: 7
      threshold-percent: 50
      volume-surge-ratio: 1.0

    drop-then-rise:
      enabled: false
      days: 5
      volume-surge-ratio: 1.0

    slow-rise:
      enabled: false
      days: 7
      max-daily-change-percent: 3
      volume-surge-ratio: 1.0

    price-drop-oi-rise:
      enabled: false
      days: 5
      max-price-rise-percent: 10
      min-oi-rise-percent: 20
      volume-surge-ratio: 1.0

    low-price-consolidation:
      enabled: false
      days: 7
      max-price-change-percent: 10
      low-price-percentile: 30
      volume-surge-ratio: 1.0

    short-term-rise:
      enabled: true
      interval: 5m
      period: 6
      threshold-percent: 3
      volume-surge-ratio: 1.0
      min-score: 70
      launch-body-ratio: 0.6
      launch-close-pos: 0.8
      launch-vol-ratio: 3.0
      taker-buy-ratio: 0.55

    bullish-accumulation:
      enabled: false
      days: 14
      min-score: 60
      price-lookback-days: 30
      drawdown-min: 10.0
      require-higher-low: true
      volume-increase-min: 1.2
      range-contraction-max: 0.8

    first-yin-day:
      enabled: false
      days: 3
      min-total-rise-percent: 15
      volume-surge-ratio: 1.0

    oi-consecutive-rise:
      enabled: true
      days: 5
      max-price-rise-percent: 7
      volume-surge-ratio: 1.0

    n-min-max:
      enabled: false
      days: 7

    n-day-low:
      enabled: false
      days: 7

    altcoin-pump-alert:
      enabled: false
      days: 7
      min-score: 65
      max-price-decline-percent: 15.0
      oi-consecutive-days: 3
      volume-expansion-ratio: 1.5
      low-price-percentile: 35.0
      wick-body-ratio: 1.5
      silent-buyer-ratio: 1.3
      max-drawdown-percent: 25.0

    reversal-long:
      enabled: false
      decline-min-days: 4
      decline-min-pct: 5.0
      decline-max-pct: 12.0
      reversal-min-pct: 1.0
      reversal-max-pct: 4.0
      take-profit-pct: 6.0
      stop-loss-pct: 4.0
      volume-confirm-ratio: 1.0
      quality-min-score: 55
    composite-score:
      enabled: true
      min-score: 50
      oi-weight: 25
      price-weight: 20
      funding-weight: 15
      volume-weight: 15
      social-weight: 0
      venue-weight: 0
      early-price-max-pct: 15.0

  schedule:
    symbol-update: "0 0 6 * * ?"
    daily-analysis: "0 5 8 * * ?"
    short-term-analysis: "0 */5 * * * ?"
    daily-kline-sync: "0 37 * * * ?"

  report:
    dir: ./reports

---
spring:
  config:
    activate:
      on-profile: test

binance:
  proxy:
    enabled: false
  concurrency:
    max-requests: 2
    request-interval-ms: 100
  analysis:
    consecutive-rise:
      days: 2
    rise-then-drop:
      days: 2
    high-rise:
      days: 3
      threshold-percent: 30
    drop-then-rise:
      days: 2
    slow-rise:
      days: 3
      max-daily-change-percent: 5
    price-drop-oi-rise:
      days: 2
      max-price-rise-percent: 10
      min-oi-rise-percent: 20
    low-price-consolidation:
      days: 3
      max-price-change-percent: 15
      low-price-percentile: 50
    short-term-rise:
      interval: 5m
      period: 6
      threshold-percent: 3
      min-score: 70
      launch-body-ratio: 0.6
      launch-close-pos: 0.8
      launch-vol-ratio: 3.0
      taker-buy-ratio: 0.55
    altcoin-pump-alert:
      days: 3
      oi-consecutive-days: 2
      max-drawdown-percent: 30.0
    reversal-long:
      decline-min-days: 3
      decline-min-pct: 3.0
      decline-max-pct: 15.0
