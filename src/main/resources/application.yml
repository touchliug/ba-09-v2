# ============================================================
# 币安USDT永续合约数据分析系统 - 主配置文件
# ============================================================

# 服务端口
server:
  port: 8080

binance:
  base-url: https://fapi.binance.com

  proxy:
    enabled: true
    host: 127.0.0.1
    port: 7897

  concurrency:
    max-requests: 10
    request-interval-ms: 100
    history-buffer-days: 30
    task-timeout-seconds: 120

  cache:
    ttl-minutes: 7
    max-size: 500

  symbol:
    file-path: ./data/symbols.json

  analysis:

    consecutive-rise:
      enabled: false
      days: 5
      volume-surge-ratio: 1.0

    rise-then-drop:
      enabled: false
      days: 5
      volume-surge-ratio: 1.0

    high-rise:
      enabled: false
      days: 7
      threshold-percent: 50
      volume-surge-ratio: 1.0

    drop-then-rise:
      enabled: false
      days: 5
      volume-surge-ratio: 1.0

    slow-rise:
      enabled: false
      days: 7
      max-daily-change-percent: 3
      volume-surge-ratio: 1.0

    price-drop-oi-rise:
      enabled: false
      days: 5
      max-price-rise-percent: 10
      min-oi-rise-percent: 20
      volume-surge-ratio: 1.0

    low-price-consolidation:
      enabled: false
      days: 7
      max-price-change-percent: 10
      low-price-percentile: 30
      volume-surge-ratio: 1.0

    short-term-rise:
      enabled: true
      interval: 5m
      period: 6
      threshold-percent: 3
      volume-surge-ratio: 1.0
      min-score: 70
      launch-body-ratio: 0.6
      launch-close-pos: 0.8
      launch-vol-ratio: 3.0
      taker-buy-ratio: 0.55

    bullish-accumulation:
      enabled: false
      days: 7
      min-score: 65
      consolidation-max-amplitude: 10
      quiet-volume-max-ratio: 0.8
      wick-body-ratio: 1.5
      oi-before-price-min-growth: 5
      oi-before-price-max-price-rise: 5
      silent-buyer-ratio: 1.3
      silent-buyer-max-ratio-cap: 10.0
      price-change-min: -3.0
      price-change-max: 8.0

    first-yin-day:
      enabled: false
      days: 3
      min-total-rise-percent: 15
      volume-surge-ratio: 1.0

    oi-consecutive-rise:
      enabled: true
      days: 5
      max-price-rise-percent: 7
      volume-surge-ratio: 1.0

    n-min-max:
      enabled: false
      days: 7

  schedule:
    symbol-update: "0 0 6 * * ?"
    daily-analysis: "0 5 8 * * ?"
    short-term-analysis: "0 */5 * * * ?"

  report:
    dir: ./reports

---
spring:
  config:
    activate:
      on-profile: test

binance:
  proxy:
    enabled: false
  concurrency:
    max-requests: 2
    request-interval-ms: 100
  cache:
    ttl-minutes: 1
  analysis:
    consecutive-rise:
      days: 2
    rise-then-drop:
      days: 2
    high-rise:
      days: 3
      threshold-percent: 30
    drop-then-rise:
      days: 2
    slow-rise:
      days: 3
      max-daily-change-percent: 5
    price-drop-oi-rise:
      days: 2
      max-price-rise-percent: 10
      min-oi-rise-percent: 20
    low-price-consolidation:
      days: 3
      max-price-change-percent: 15
      low-price-percentile: 50
    short-term-rise:
      interval: 5m
      period: 6
      threshold-percent: 3
      min-score: 70
      launch-body-ratio: 0.6
      launch-close-pos: 0.8
      launch-vol-ratio: 3.0
      taker-buy-ratio: 0.55
